<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepfake Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050810;
      color: #e2e8f0;
      padding: 20px;
    }
    h1 { font-size: 1.1rem; color: #00d4ff; margin-bottom: 8px; }
    p  { font-size: 0.85rem; color: #64748b; margin-bottom: 16px; }
    button {
      width: 100%;
      background: #00d4ff;
      color: #050810;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #00b8e6; }
    #status {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #64748b;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Deepfake Shield 🛡</h1>
  <p>Click below to scan videos on the current page.</p>
  <button id="scan-btn">Scan Page for Deepfakes</button>
  <div id="status"></div>

  <script>
    document.getElementById('scan-btn').addEventListener('click', () => {
      const status = document.getElementById('status')
      status.textContent = 'Scanning…'

      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        chrome.scripting.executeScript({
          target: { tabId: tabs[0].id },
          func: () => {
            const videos = document.querySelectorAll('video')
            return videos.length
          }
        }, (results) => {
          const count = results?.[0]?.result ?? 0
          status.textContent = count > 0
            ? `Found ${count} video(s) on this page. Open the main app to analyze.`
            : 'No video elements found on this page.'
        })
      })
    })
  </script>
</body>
</html>
